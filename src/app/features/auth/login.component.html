<div class="login-bg">
  <div class="login-layout">

    <!-- Panel izquierdo — branding -->
    <div class="login-panel-left">
      <div class="login-brand">
        <div class="login-brand-icon">📊</div>
        <div class="login-brand-name">CFDI Comparator</div>
      </div>
      <div class="login-headline">
        Compara tus CFDIs del ERP<br>contra el SAT en segundos
      </div>
      <div class="login-features">
        <div class="login-feature">
          <span class="login-feature-dot" style="background:#10b981;"></span>
          Verificación en tiempo real con el SAT
        </div>
        <div class="login-feature">
          <span class="login-feature-dot" style="background:#6366f1;"></span>
          Comparación campo a campo automática
        </div>
        <div class="login-feature">
          <span class="login-feature-dot" style="background:#f59e0b;"></span>
          Detección de discrepancias fiscales
        </div>
      </div>
    </div>

    <!-- Panel derecho — formulario -->
    <div class="login-panel-right">
      <div class="login-card">

        <div style="margin-bottom:1.75rem;">
          <div class="login-title">Iniciar sesión</div>
          <div class="login-sub">Ingresa tus credenciales para continuar</div>
        </div>

        <div *ngIf="error" class="login-error">
          <span>⚠</span> {{ error }}
        </div>

        <form [formGroup]="form" (ngSubmit)="submit()">
          <div class="login-field">
            <label class="form-label">Correo electrónico</label>
            <input formControlName="email" type="email"
              placeholder="usuario@empresa.com"
              class="login-input"
              autocomplete="email">
          </div>
          <div class="login-field">
            <label class="form-label">Contraseña</label>
            <input formControlName="password" type="password"
              placeholder="••••••••"
              class="login-input"
              autocomplete="current-password">
          </div>
          <button type="submit" [disabled]="form.invalid || loading" class="login-btn">
            <span *ngIf="!loading">Iniciar sesión →</span>
            <span *ngIf="loading" style="display:flex;align-items:center;gap:0.5rem;justify-content:center;">
              <span class="login-spinner"></span> Verificando...
            </span>
          </button>
        </form>

        <div style="margin-top:1.5rem; padding-top:1.25rem; border-top:1px solid var(--gray-100); text-align:center;">
          <span class="text-xs text-muted">Sistema interno · Acceso restringido</span>
        </div>

      </div>
    </div>

  </div>
</div>
