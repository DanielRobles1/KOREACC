<ng-container *ngIf="auth.isAuthenticated; else noLayout">
  <div class="app-layout">

    <nav class="sidebar" [class.sidebar-collapsed]="sidebarCollapsed">

      <!-- Brand + toggle -->
      <div class="sidebar-brand">
        <div *ngIf="!sidebarCollapsed" class="sidebar-brand-name">CFDI Comparator</div>
        <div *ngIf="!sidebarCollapsed" class="sidebar-brand-sub">ERP vs SAT</div>
        <button (click)="toggleSidebar()" class="sidebar-toggle" [title]="sidebarCollapsed ? 'Expandir' : 'Colapsar'">
          {{ sidebarCollapsed ? '›' : '‹' }}
        </button>
      </div>

      <!-- Navigation -->
      <div class="sidebar-nav">
        <div *ngIf="!sidebarCollapsed" class="sidebar-section">Principal</div>
        <a routerLink="/dashboard" routerLinkActive="active" [title]="sidebarCollapsed ? 'Dashboard' : ''">
          <span class="sidebar-icon">▦</span>
          <span *ngIf="!sidebarCollapsed">Dashboard</span>
        </a>
        <a routerLink="/cfdis" routerLinkActive="active" [title]="sidebarCollapsed ? 'CFDIs' : ''">
          <span class="sidebar-icon">⊡</span>
          <span *ngIf="!sidebarCollapsed">CFDIs</span>
        </a>

        <div *ngIf="!sidebarCollapsed" class="sidebar-section">Análisis</div>
        <a routerLink="/comparisons" routerLinkActive="active" [title]="sidebarCollapsed ? 'Comparaciones' : ''">
          <span class="sidebar-icon">⇄</span>
          <span *ngIf="!sidebarCollapsed">Comparaciones</span>
        </a>
        <a routerLink="/discrepancies" routerLinkActive="active" [title]="sidebarCollapsed ? 'Discrepancias' : ''">
          <span class="sidebar-icon">△</span>
          <span *ngIf="!sidebarCollapsed">Discrepancias</span>
        </a>
      </div>

      <!-- Footer -->
      <div class="sidebar-footer" *ngIf="!sidebarCollapsed">
        <div class="sidebar-user">
          <div class="sidebar-avatar">{{ (auth.currentUser?.email || 'U')[0].toUpperCase() }}</div>
          <div>
            <div class="sidebar-user-name">{{ (auth.currentUser?.email || 'usuario@').split('@')[0] }}</div>
            <div class="sidebar-user-role">{{ auth.currentUser?.role || 'admin' }}</div>
          </div>
        </div>
        <button (click)="logout()" class="btn btn-ghost btn-sm w-full"
          style="justify-content:center; color:#94a3b8; border:1px solid rgba(255,255,255,0.08);">
          Cerrar sesión
        </button>
      </div>

      <div class="sidebar-footer" *ngIf="sidebarCollapsed" style="padding:0.75rem 0; display:flex; justify-content:center;">
        <button (click)="logout()" class="sidebar-toggle" title="Cerrar sesión" style="font-size:1rem;">⏻</button>
      </div>

    </nav>

    <main class="main-content">
      <router-outlet></router-outlet>
    </main>

  </div>
</ng-container>

<ng-template #noLayout>
  <router-outlet></router-outlet>
</ng-template>
